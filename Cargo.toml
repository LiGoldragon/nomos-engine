[package]
name="nomos-engine"
version="0.1.0"
edition="2024"
rust-version="1.89"
license="MIT OR Apache-2.0"
repository="https://github.com/LiGoldragon/nomos-engine"
description="CoreNomos transformation daemon and thin CLI"
[dependencies]
core-nomos={git="https://github.com/LiGoldragon/core-nomos.git",rev="cf3cb9e56454fcaaa2f4fb16a1f3e9bb6ee6752e"}
kameo={git="https://github.com/LiGoldragon/kameo.git",rev="f491b45d7dcb55e5837eddde3d5d7ca8ceaa9f01",default-features=false,features=["macros"]}
name-table={git="https://github.com/LiGoldragon/name-table.git",rev="c3237f77c087e6feab49d6cf34971cebc14a11e6"}
notify="8"
rkyv={version="0.8",features=["bytecheck"]}
signal-nomos={git="https://github.com/LiGoldragon/signal-nomos.git",rev="a5e97fe25bfb37361eee07271053e76ffba67b81"}
signal-schema={git="https://github.com/LiGoldragon/signal-schema.git",rev="8e47cb93df02dc2a6b34eba2266c48eee2ba3452"}
signal-sema-storage={git="https://github.com/LiGoldragon/signal-sema-storage.git",rev="1a7d50b99327acf3658fd8647ab91859e8c4be15"}
tokio={version="1",features=["macros","rt-multi-thread","net","io-util","sync","time"]}
thiserror="2"
[lints.rust]
unsafe_code="forbid"
