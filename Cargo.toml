[package]
name="nomos-engine"
version="0.1.0"
edition="2024"
rust-version="1.89"
license="MIT OR Apache-2.0"
repository="https://github.com/LiGoldragon/nomos-engine"
description="CoreNomos transformation daemon and thin CLI"
[dependencies]
core-nomos={git="https://github.com/LiGoldragon/core-nomos.git",rev="d2f705808ed555cae0ead6a9181970ef1fdc0430"}
kameo={git="https://github.com/LiGoldragon/kameo.git",rev="f491b45d7dcb55e5837eddde3d5d7ca8ceaa9f01",default-features=false,features=["macros"]}
name-table={git="https://github.com/LiGoldragon/name-table.git",rev="c3237f77c087e6feab49d6cf34971cebc14a11e6"}
rkyv={version="0.8",features=["bytecheck"]}
signal-nomos={git="https://github.com/LiGoldragon/signal-nomos.git",rev="afdf62f371f5b52eab5122dc0de6d1bf40ba753c"}
signal-schema={git="https://github.com/LiGoldragon/signal-schema.git",rev="1b090702e5c2f792a64e2cf1c51a5698505d9bad"}
signal-sema-storage={git="https://github.com/LiGoldragon/signal-sema-storage.git",rev="bd6cd6c4f2f020ad04427fc8ca86ca22d9cf4e6c"}
tokio={version="1",features=["macros","rt-multi-thread","net","io-util","sync","time"]}
thiserror="2"
[lints.rust]
unsafe_code="forbid"
