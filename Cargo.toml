[package]
name="nomos-engine"
version="0.1.0"
edition="2024"
rust-version="1.89"
license="MIT OR Apache-2.0"
repository="https://github.com/LiGoldragon/nomos-engine"
description="CoreNomos transformation daemon and thin CLI"
[dependencies]
core-nomos={git="https://github.com/LiGoldragon/core-nomos.git",rev="619df0afb9959d1673994ff29bcaa95181e006d5"}
kameo={git="https://github.com/LiGoldragon/kameo.git",rev="f491b45d7dcb55e5837eddde3d5d7ca8ceaa9f01",default-features=false,features=["macros"]}
name-table={git="https://github.com/LiGoldragon/name-table.git",rev="c3237f77c087e6feab49d6cf34971cebc14a11e6"}
notify="8"
rkyv={version="0.8",features=["bytecheck"]}
signal-nomos={git="https://github.com/LiGoldragon/signal-nomos.git",rev="243ac371683c0045a7de56e235533bc4fc0b84eb"}
signal-schema={git="https://github.com/LiGoldragon/signal-schema.git",rev="a7d62024aad57a761a3e60b397eb475c4858b4f5"}
signal-sema-storage={git="https://github.com/LiGoldragon/signal-sema-storage.git",rev="54178a10f893cc0eef09e62f371487f09823937f"}
tokio={version="1",features=["macros","rt-multi-thread","net","io-util","sync","time"]}
thiserror="2"
[lints.rust]
unsafe_code="forbid"
