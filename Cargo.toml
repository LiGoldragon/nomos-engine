[package]
name="nomos-engine"
version="0.1.0"
edition="2024"
rust-version="1.89"
license="MIT OR Apache-2.0"
repository="https://github.com/LiGoldragon/nomos-engine"
description="CoreNomos transformation daemon and thin CLI"
[dependencies]
core-nomos={git="https://github.com/LiGoldragon/core-nomos.git",rev="88a1ecf552727b2037263423da8a4af0e65619e1"}
wire-core-logos={package="core-logos",git="https://github.com/LiGoldragon/core-logos.git",rev="17cbd7596df203e0717fe079b7688cc60ec05e4b"}
kameo={git="https://github.com/LiGoldragon/kameo.git",rev="f491b45d7dcb55e5837eddde3d5d7ca8ceaa9f01",default-features=false,features=["macros"]}
name-table={git="https://github.com/LiGoldragon/name-table.git",rev="c3237f77c087e6feab49d6cf34971cebc14a11e6"}
rkyv={version="0.8",features=["bytecheck"]}
signal-nomos={git="https://github.com/LiGoldragon/signal-nomos.git",rev="63e8c9e0c41d43faa5b591b700ddb4f6c32d0fe8"}
signal-sema-storage={git="https://github.com/LiGoldragon/signal-sema-storage.git",rev="a86cb480ff9505b0c068fc0152de352be99d0ef2"}
tokio={version="1",features=["macros","rt-multi-thread","net","io-util"]}
thiserror="2"
[lints.rust]
unsafe_code="forbid"
